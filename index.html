<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='UTF-8'>
  <title>AgroCast</title>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <script src='https://cdn.tailwindcss.com'></script>
</head>
<body class='p-6'>
  <h1 class='text-2xl font-bold mb-4'>🌱 AgroCast</h1>
  <div id='summary' class='mb-4'></div>
  <div id='signal' class='mb-4'></div>
  <div id='forecast' class='mb-4'></div>
  <div id='drivers' class='mb-4'></div>
  <div id='news' class='mb-4'></div>

  <script>
    function generateForecast(lastPrice, trend) {
      const monthsHistory = 12;
      const monthsForecast = 24;
      const data = [];
      const today = new Date();
      for (let i = monthsHistory; i > 0; i--) {
        const date = new Date(today);
        date.setMonth(date.getMonth() - i);
        data.push({
          date: date.toISOString().slice(0, 7),
          price: lastPrice - i
        });
      }
      let currentPrice = lastPrice;
      const drift = trend === 'alcista' ? 1 : trend === 'bajista' ? -1 : 0;
      for (let i = 1; i <= monthsForecast; i++) {
        currentPrice += drift + (Math.random() * 2 - 1);
        const date = new Date(today);
        date.setMonth(date.getMonth() + i);
        data.push({
          date: date.toISOString().slice(0, 7),
          price: currentPrice
        });
      }
      return data;
    }

    const defaultNews = [
      {
        title: 'China aumenta importaciones de soja',
        impact: 'alcista',
        summary: 'El crecimiento de la demanda china impulsa los precios de la soja en el mercado internacional.'
      },
      {
        title: 'El petróleo sube un 5% por tensiones geopolíticas',
        impact: 'alcista',
        summary: 'El aumento del precio del crudo encarece los costos logísticos, ejerciendo presión alcista sobre los granos.'
      },
      {
        title: 'La Fed mantiene las tasas de interés estables',
        impact: 'lateral',
        summary: 'La estabilidad monetaria reduce la volatilidad del dólar, generando un escenario neutro para la soja.'
      }
    ];

    function getTrendIcon(trend) {
      if (trend === 'alcista') return '🟢 Alcista';
      if (trend === 'bajista') return '🔴 Bajista';
      return '🟡 Lateral';
    }

    function getSignalIcon(signal) {
      if (signal === 'VENDER') return '🟢';
      if (signal === 'COMPRAR') return '🔴';
      return '🟡';
    }

    fetch('https://agrocast-backend-fe59.onrender.com/signals')
      .then(response => response.json())
      .then(data => {
        const forecast = generateForecast(data.price, data.trend);
        const news = data.news || defaultNews;

        // Summary
        document.getElementById('summary').innerHTML =
          '<p class=\'text-lg\'>Soja: ' + data.price.toFixed(2) + ' USD/TN</p>' +
          '<p class=\'text-sm\'>Tendencia: ' + getTrendIcon(data.trend) + '</p>';

        // Signal
        let signalHtml = '<h2 class=\'font-semibold mb-1\'>🚨 Señal</h2>';
        signalHtml += '<p class=\'text-xl font-bold\'>' + getSignalIcon(data.signal) + ' ' + data.signal + '</p>';
        signalHtml += '<p class=\'text-sm\'>Confianza: ' + Math.round(data.confidence * 100) + '%</p>';
        signalHtml += '<ul class=\'list-disc ml-5 mt-2\'>';
        data.explanation.forEach(function(e) {
          signalHtml += '<li class=\'text-sm\'>' + e + '</li>';
        });
        signalHtml += '</ul>';
        document.getElementById('signal').innerHTML = signalHtml;

        // Forecast Table
        let fcHtml = '<h2 class=\'font-semibold mb-1\'>📊 Forecast</h2>';
        fcHtml += '<table class=\'min-w-full text-sm border-collapse\'>';
        fcHtml += '<thead><tr><th class=\'px-2 py-1 border\'>Fecha</th><th class=\'px-2 py-1 border\'>Precio (USD)</th></tr></thead><tbody>';
        forecast.forEach(function(row) {
          fcHtml += '<tr><td class=\'px-2 py-1 border\'>' + row.date + '</td><td class=\'px-2 py-1 border\'>' + row.price.toFixed(2) + '</td></tr>';
        });
        fcHtml += '</tbody></table>';
        document.getElementById('forecast').innerHTML = fcHtml;

        // Drivers
        let drvHtml = '<h2 class=\'font-semibold mb-1\'>📈 Drivers</h2>';
        Object.keys(data.drivers).forEach(function(key) {
          const val = data.drivers[key];
          drvHtml += '<div class=\'flex justify-between text-sm\'><span>' + key + '</span><span>' + (val * 100).toFixed(0) + '%</span></div>';
        });
        document.getElementById('drivers').innerHTML = drvHtml;

        // News
        let newsHtml = '<h2 class=\'font-semibold mb-1\'>📰 Noticias</h2>';
        news.forEach(function(item) {
          newsHtml += '<div class=\'mb-2\'>';
          newsHtml += '<p class=\'font-semibold\'>' + item.title + ' → Impacto: ' + item.impact + '</p>';
          newsHtml += '<p class=\'text-sm text-gray-600\'>' + item.summary + '</p>';
          newsHtml += '</div>';
        });
        document.getElementById('news').innerHTML = newsHtml;
      })
      .catch(function(error) {
        document.body.innerHTML = '<p>Error al cargar datos: ' + error.message + '</p>';
      });
  </script>
</body>
</html>
